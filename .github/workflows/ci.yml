name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend
        run: cd apps/api && uv sync --all-groups
      - name: Ruff
        run: cd apps/api && uv run ruff check .
      - name: MyPy
        run: cd apps/api && uv run mypy .
      - name: Pytest
        run: cd apps/api && uv run pytest
      - name: Migration check
        run: make migration-check

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
      - name: Install frontend
        run: npm install
      - name: Install API for E2E
        run: cd apps/api && uv sync --all-groups
      - name: Typecheck
        run: npm --workspace apps/web run typecheck
      - name: Unit tests
        run: npm --workspace apps/web run test
      - name: Install Playwright browser
        run: npm --workspace apps/web exec -- playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm --workspace apps/web run test:e2e
      - name: Build
        run: npm --workspace apps/web run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
      - name: Install frontend dependencies
        run: npm install
      - name: High severity npm audit
        run: make security-audit

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Docker build
        run: docker compose build

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform fmt
        run: terraform -chdir=infrastructure/terraform fmt -check
      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform init -backend=false && terraform -chdir=infrastructure/terraform validate
