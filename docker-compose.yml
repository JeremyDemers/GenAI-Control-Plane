services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: control_plane
      POSTGRES_PASSWORD: control_plane
      POSTGRES_DB: control_plane
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_plane -d control_plane"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file: .env.example
    environment:
      APP_ENV: ${APP_ENV:-local}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      DATABASE_URL: postgresql+psycopg://control_plane:control_plane@postgres:5432/control_plane
      PROVIDER_MODE: ${PROVIDER_MODE:-mock}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    command: ["uv", "run", "python", "-m", "app.workers.scheduler"]
    env_file: .env.example
    depends_on:
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres-data:
