services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: control_plane
      POSTGRES_PASSWORD: control_plane
      POSTGRES_DB: control_plane
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_plane -d control_plane"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file: .env.example
    environment:
      APP_ENV: ${APP_ENV:-local}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_JWKS_JSON: ${OIDC_JWKS_JSON:-}
      OIDC_HS256_SECRET: ${OIDC_HS256_SECRET:-}
      OIDC_ALLOWED_ALGORITHMS: ${OIDC_ALLOWED_ALGORITHMS:-["RS256","ES256","HS256"]}
      OIDC_EMAIL_CLAIMS: ${OIDC_EMAIL_CLAIMS:-["email","preferred_username","upn"]}
      OIDC_GROUP_CLAIMS: ${OIDC_GROUP_CLAIMS:-["groups","roles"]}
      OIDC_GROUP_ROLE_MAP_JSON: ${OIDC_GROUP_ROLE_MAP_JSON:-}
      OIDC_AUTO_PROVISION_USERS: ${OIDC_AUTO_PROVISION_USERS:-false}
      OIDC_AUTO_PROVISION_DEFAULT_ROLE: ${OIDC_AUTO_PROVISION_DEFAULT_ROLE:-employee}
      OIDC_TOKEN_ENDPOINT: ${OIDC_TOKEN_ENDPOINT:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-genai_cp_session}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:-false}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-12}
      DATABASE_URL: postgresql+psycopg://control_plane:control_plane@postgres:5432/control_plane
      PROVIDER_MODE: ${PROVIDER_MODE:-mock}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    command: ["uv", "run", "python", "-m", "app.workers.scheduler"]
    env_file: .env.example
    environment:
      APP_ENV: ${APP_ENV:-local}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_JWKS_JSON: ${OIDC_JWKS_JSON:-}
      OIDC_HS256_SECRET: ${OIDC_HS256_SECRET:-}
      OIDC_ALLOWED_ALGORITHMS: ${OIDC_ALLOWED_ALGORITHMS:-["RS256","ES256","HS256"]}
      OIDC_EMAIL_CLAIMS: ${OIDC_EMAIL_CLAIMS:-["email","preferred_username","upn"]}
      OIDC_GROUP_CLAIMS: ${OIDC_GROUP_CLAIMS:-["groups","roles"]}
      OIDC_GROUP_ROLE_MAP_JSON: ${OIDC_GROUP_ROLE_MAP_JSON:-}
      OIDC_AUTO_PROVISION_USERS: ${OIDC_AUTO_PROVISION_USERS:-false}
      OIDC_AUTO_PROVISION_DEFAULT_ROLE: ${OIDC_AUTO_PROVISION_DEFAULT_ROLE:-employee}
      OIDC_TOKEN_ENDPOINT: ${OIDC_TOKEN_ENDPOINT:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-genai_cp_session}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:-false}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-12}
      DATABASE_URL: postgresql+psycopg://control_plane:control_plane@postgres:5432/control_plane
      PROVIDER_MODE: ${PROVIDER_MODE:-mock}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-development}
        NEXT_PUBLIC_OIDC_AUTHORIZATION_ENDPOINT: ${NEXT_PUBLIC_OIDC_AUTHORIZATION_ENDPOINT:-}
        NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-}
        NEXT_PUBLIC_OIDC_REDIRECT_URI: ${NEXT_PUBLIC_OIDC_REDIRECT_URI:-http://localhost:3000}
        NEXT_PUBLIC_OIDC_SCOPE: ${NEXT_PUBLIC_OIDC_SCOPE:-openid profile email offline_access}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${NEXT_PUBLIC_MICROSOFT_TENANT_ID:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-development}
      NEXT_PUBLIC_OIDC_AUTHORIZATION_ENDPOINT: ${NEXT_PUBLIC_OIDC_AUTHORIZATION_ENDPOINT:-}
      NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-}
      NEXT_PUBLIC_OIDC_REDIRECT_URI: ${NEXT_PUBLIC_OIDC_REDIRECT_URI:-http://localhost:3000}
      NEXT_PUBLIC_OIDC_SCOPE: ${NEXT_PUBLIC_OIDC_SCOPE:-openid profile email offline_access}
      NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${NEXT_PUBLIC_MICROSOFT_TENANT_ID:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
